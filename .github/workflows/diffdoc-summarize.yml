name: DiffDoc Summaries
on:
  push:
    branches:
      - main
    paths-ignore:
      - ".diffdoc/manifest.json"
      - ".diffdoc/summaries/**"
      - ".diffdoc/vectra/**"
permissions:
  contents: write
concurrency:
  group: diffdoc-summarize-main
  cancel-in-progress: false
jobs:
  summarize:
    name: Update DiffDoc manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: sullyTheDev/diffdoc-action@main
        id: diffdoc
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          ai-provider: ${{ vars.AI_PROVIDER || 'cloud' }}
          base-dir: ${{ vars.DIFFDOC_BASE_DIR || '.diffdoc' }}
          cloud-llm-endpoint: ${{ vars.CLOUD_LLM_ENDPOINT || 'https://api.openai.com/v1' }}
          cloud-chat-model: ${{ vars.CLOUD_CHAT_MODEL || 'gpt-4o-mini' }}
          summarize-concurrency: '2'